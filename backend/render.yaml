services:
  - type: web
    name: waterpurifier-backend
    env: node
    plan: free
    buildCommand: npm install && cd .. && npm install --prefix backend
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: CORS_ORIGINS
        sync: false
      - key: WHATSAPP_NUMBER
        value: 919999999999
